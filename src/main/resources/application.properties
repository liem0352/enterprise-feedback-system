# ========================================
# 企业内部意见反馈系统 - 应用配置
# 作者: liem
# ========================================

# ---------- 服务器配置 ----------
server.port=8080
server.servlet.context-path=/

# ---------- 数据源配置 (MySQL) ----------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/feedback_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=tyb1124

# ---------- MyBatis-Plus 配置 ----------
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.liem.feedback.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 开启 SQL 日志（用于截图证明缓存效果）
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ---------- Thymeleaf 配置 ----------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ---------- Redis 配置 ----------
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=5000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# ---------- Spring Cache 配置 ----------
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ---------- RabbitMQ 配置 ----------
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
# 消息确认机制
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# ---------- 日志配置 ----------
logging.level.com.liem.feedback=debug
logging.level.org.springframework.cache=debug
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ---------- 应用信息 ----------
spring.application.name=enterprise-feedback-system
