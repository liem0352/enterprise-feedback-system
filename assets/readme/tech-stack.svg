    <rect x="206" y="86" width="946" height="42" rx="8" fill="#161C24" stroke="#2A2F36" stroke-width="1"/>
    <text x="679" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#E8E4D9" text-anchor="middle">Spring Boot 2.7.18  ·  Spring MVC  ·  Thymeleaf</text>
  </g>

  <g id="ts-layer-2">
    <rect x="48" y="138" width="150" height="42" rx="8" fill="#1A2028" stroke="#4A9EFF" stroke-width="1.5"/>
    <text x="123" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#4A9EFF" text-anchor="middle" font-weight="600">服务层</text>
    <rect x="206" y="138" width="946" height="42" rx="8" fill="#161C24" stroke="#2A2F36" stroke-width="1"/>
    <text x="679" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#E8E4D9" text-anchor="middle">MyBatis-Plus 3.5.5  ·  Spring Cache  ·  @Cacheable</text>
