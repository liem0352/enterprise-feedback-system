  <g id="ts-layer-3">
    <rect x="48" y="190" width="150" height="42" rx="8" fill="#1A2028" stroke="#6BBE7A" stroke-width="1.5"/>
    <text x="123" y="216" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6BBE7A" text-anchor="middle" font-weight="600">基础设施</text>
    <rect x="206" y="190" width="946" height="42" rx="8" fill="#161C24" stroke="#2A2F36" stroke-width="1"/>
    <text x="679" y="216" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#E8E4D9" text-anchor="middle">MySQL 9.4  ·  Redis  ·  RabbitMQ</text>
