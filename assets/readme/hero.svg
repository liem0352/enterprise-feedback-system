    </g>

    <g transform="translate(0,98)">
      <rect width="150" height="46" rx="9" fill="#0d241d" stroke="#1f6f5c"/>
      <text x="75" y="22" text-anchor="middle" font-size="13.5" fill="#34d399" font-weight="600">Redis 缓存</text>
      <text x="75" y="38" text-anchor="middle" font-size="11" fill="#3a8a72" font-family="ui-monospace,monospace">@Cacheable</text>
    </g>

    <path d="M75,144 L75,172" stroke="#5e6b66" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>
    <path d="M445,68 L445,110 L150,172" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

    <g transform="translate(190,176)">
      <rect width="150" height="46" rx="9" fill="#1c1408" stroke="#7a5217"/>
      <text x="75" y="22" text-anchor="middle" font-size="13.5" fill="#f59e0b" font-weight="600">feedback.queue</text>
      <text x="75" y="38" text-anchor="middle" font-size="11" fill="#9c7438" font-family="ui-monospace,monospace">队列绑定</text>
    </g>

    <path d="M340,199 L368,199" stroke="#f59e0b" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>

    <g transform="translate(370,176)">
      <rect width="150" height="46" rx="9" fill="#11201b" stroke="#2a3a34"/>
      <text x="75" y="22" text-anchor="middle" font-size="13.5" fill="#eaf2ee" font-weight="600">消费者监听</text>
      <text x="75" y="38" text-anchor="middle" font-size="11" fill="#7d8c86" font-family="ui-monospace,monospace">@RabbitListener</text>
    </g>
  </g>

  <text x="56" y="312" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#5e6b66">author: liem · /submit → /list · Glassmorphism UI · WCAG AA</text>
